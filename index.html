<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisli Balon | Özenle Tasarlanmış Hediyeler</title>
    <!-- Tasarım Kütüphanesi -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pastel arka plan için ekstra dokunuş */
        body { background-color: #fdfbfb; }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased">
    
    <!-- Başlık Kısmı -->
    <header class="bg-rose-100 py-10 mb-10 shadow-sm border-b border-rose-200">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h1 class="text-4xl font-extrabold text-rose-800 tracking-tight">Hisli Balon</h1>
            <p class="text-rose-600 mt-2 font-medium">Özel anlarınız için özenle tasarlandı</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        
        <!-- Çiçekli Aranjmanlar Kategorisi -->
        <div class="mb-16">
            <h2 class="text-3xl font-bold text-rose-700 mb-2">Çiçekli Aranjmanlar</h2>
            <div class="w-24 h-1 bg-rose-300 mb-8 rounded-full"></div>
            <div id="cicekli-vitrin" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Ürünler buraya gelecek -->
            </div>
        </div>

        <!-- Hediyelik & Peluş Kategorisi -->
        <div>
            <h2 class="text-3xl font-bold text-purple-700 mb-2">Hediyelik & Peluş</h2>
            <div class="w-24 h-1 bg-purple-300 mb-8 rounded-full"></div>
            <div id="pelus-vitrin" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Ürünler buraya gelecek -->
            </div>
        </div>

    </main>

    <!-- Ürünleri Çeken ve Ayrıştıran Sihirli Kod -->
    <script>
        // KENDİ WHATSAPP NUMARANIZI BURAYA YAZIN (Başında + veya 0 olmadan, 90 ile başlayarak)
        const whatsappNumarasi = "905373568453";

        fetch('urunler.json')
            .then(response => response.json())
            .then(data => {
                const cicekliVitrin = document.getElementById('cicekli-vitrin');
                const pelusVitrin = document.getElementById('pelus-vitrin');
                
                cicekliVitrin.innerHTML = ''; 
                pelusVitrin.innerHTML = ''; 
                
                if(!data.products || data.products.length === 0) {
                    cicekliVitrin.innerHTML = '<p class="text-gray-500 italic">Henüz ürün eklenmemiş.</p>';
                    pelusVitrin.innerHTML = '<p class="text-gray-500 italic">Henüz ürün eklenmemiş.</p>';
                    return;
                }

                data.products.forEach(urun => {
                    const imageUrl = urun.image1 ? urun.image1.replace('/images/', 'images/') : '';
                    
                    // WhatsApp Mesajını Hazırlama
                    const mesaj = encodeURIComponent(`Merhaba, Hisli Balon sitesinden ulaşıyorum. "${urun.title}" ürünü hakkında bilgi almak/sipariş vermek istiyorum.`);
                    const wpLink = `https://wa.me/${whatsappNumarasi}?text=${mesaj}`;

                    // Ürün Kartı Tasarımı
                    const card = `
                        <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden border border-gray-100 flex flex-col h-full">
                            <img src="${imageUrl}" alt="${urun.title}" class="w-full h-72 object-cover">
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="text-xl font-bold text-gray-800 mb-2">${urun.title}</h3>
                                <p class="text-gray-500 text-sm flex-grow mb-4">${urun.description}</p>
                                
                                <div class="mb-5">
                                    ${urun.inStock 
                                        ? '<span class="bg-green-50 text-green-700 border border-green-200 text-xs px-3 py-1.5 rounded-full font-semibold">Stokta Var</span>' 
                                        : '<span class="bg-red-50 text-red-700 border border-red-200 text-xs px-3 py-1.5 rounded-full font-semibold">Tükendi</span>'}
                                </div>
                                
                                <div class="space-y-3 mt-auto">
                                    <!-- WhatsApp Butonu -->
                                    <a href="${wpLink}" target="_blank" class="w-full bg-[#25D366] hover:bg-[#1ebd5a] text-white font-bold py-3 px-4 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-sm">
                                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                                        WhatsApp'tan Sipariş
                                    </a>
                                    
                                    <!-- Shopier Butonu (Sadece panele link girilmişse görünür) -->
                                    ${urun.shopier 
                                        ? `<a href="${urun.shopier}" target="_blank" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-4 rounded-xl transition duration-200 flex justify-center items-center gap-2 shadow-sm">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                                            Shopier ile Güvenli Al
                                           </a>` 
                                        : ''}
                                </div>
                            </div>
                        </div>
                    `;

                    // Ürünü Seçilen Kategoriye Göre İlgili Rafa Koyma
                    if(urun.category === "Çiçekli Aranjmanlar") {
                        cicekliVitrin.innerHTML += card;
                    } else if(urun.category === "Hediyelik & Peluş") {
                        pelusVitrin.innerHTML += card;
                    }
                });

                // Eğer kategoride ürün yoksa uyarı gösterme
                if(cicekliVitrin.innerHTML === '') cicekliVitrin.innerHTML = '<p class="text-rose-400 italic col-span-full">Bu koleksiyona yakında yeni ürünler eklenecek.</p>';
                if(pelusVitrin.innerHTML === '') pelusVitrin.innerHTML = '<p class="text-purple-400 italic col-span-full">Bu koleksiyona yakında yeni ürünler eklenecek.</p>';
            })
            .catch(error => {
                console.error("Hata:", error);
            });
    </script>
</body>
</html>
