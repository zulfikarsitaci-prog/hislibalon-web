<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisli Balon Atölyesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --bg-color: #FAF6F5; --accent-color: #CFA8A8; --text-main: #3A3A3A; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; }
        
        /* Basit Navbar */
        .navbar { padding: 20px 40px; background: #fff; text-align: center; font-family: 'Playfair Display'; font-size: 1.5rem; letter-spacing: 2px; }
        
        /* Ana Vitrin Grid */
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        @media (max-width: 768px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
        
        .product-card { background: white; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { font-family: 'Playfair Display'; margin: 15px 0 5px 0; }
        .product-card p { color: var(--accent-color); font-weight: 600; }

        /* Ürün Detay Penceresi (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 500px; border-radius: 16px; position: relative; max-height: 80vh; overflow-y: auto; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">Hisli Balon</nav>

    <main class="main-container">
        <h2 id="cat-title" style="text-align:center; font-family:'Playfair Display';">Ürünlerimiz</h2>
        <div class="products-grid" id="store-front"></div>
    </main>

    <!-- Detay Modal'ı -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProduct()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const WHATSAPP = "905373568453";
        const sheetCSV = "https://docs.google.com/spreadsheets/d/1ii4RrMqvNBm9HMlfVJI4x2riVtWP14J-9MfCAn2b9-0/export?format=csv";
        let products = [];

        Papa.parse(sheetCSV, { download: true, header: true, complete: (res) => { products = res.data; renderHome(); } });

        function renderHome() {
            const container = document.getElementById('store-front');
            container.innerHTML = products.map((p, i) => p.UrunAdi ? `
                <div class="product-card" onclick="openProduct(${i})">
                    <img src="${p.ResimURL || ''}">
                    <h3>${p.UrunAdi}</h3>
                    <p>${p.Fiyat} TL</p>
                </div>
            ` : '').join('');
        }

        function openProduct(i) {
            const p = products[i];
            document.getElementById('modal-body').innerHTML = `
                <img src="${p.ResimURL}" style="width:100%; border-radius:8px;">
                <h2 style="font-family:'Playfair Display'">${p.UrunAdi}</h2>
                <p><strong>Fiyat:</strong> ${p.Fiyat} TL</p>
                <p>${p.Aciklama || ''}</p>
                ${p.VaryasyonBasligi1 ? `<label>${p.VaryasyonBasligi1}</label><select id="s1" class="custom-select">${p.Varyasyonlar1.split(',').map(o=>`<option>${o}</option>`).join('')}</select>` : ''}
                ${p.OzelNot ? `<label>${p.OzelNot}</label><input type="text" id="note" class="custom-input" placeholder="Yazınız...">` : ''}
                <div style="margin-top:20px;">
                    ${p.ShopierLink ? `<a href="${p.ShopierLink}" class="btn" style="display:block; background:#CFA8A8; color:white; padding:10px; text-align:center; text-decoration:none; margin-bottom:10px; border-radius:5px;">Kredi Kartı ile Al</a>` : ''}
                    <button onclick="sendWA(${i})" style="width:100%; padding:10px; background:#A3D4B6; border:none; border-radius:5px;">WhatsApp Sipariş</button>
                </div>
            `;
            document.getElementById('productModal').style.display = "block";
        }

        function closeProduct() { document.getElementById('productModal').style.display = "none"; }

        function sendWA(i) {
            const p = products[i];
            const s1 = document.getElementById('s1') ? document.getElementById('s1').value : '';
            const note = document.getElementById('note') ? document.getElementById('note').value : '';
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP}&text=Merhaba, ${p.UrunAdi} istiyorum. ${s1} ${note}`);
        }
    </script>
</body>
</html>
