<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisli Balon Atölyesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --bg-color: #FAF6F5; --accent-color: #CFA8A8; --text-main: #3A3A3A; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; }
        
        .navbar { padding: 30px 40px; background: #fff; text-align: center; font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 3px; color: #222; border-bottom: 1px solid #eee; }
        
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        /* Vitrin Grid Yapısı */
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        @media (max-width: 600px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
        
        /* Kart Alanı - Kalp konumlandırması için relative yapıldı */
        .product-card { position: relative; background: white; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f0f0; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin: 15px 0 5px 0; color: #333; }
        .product-card p { color: var(--accent-color); font-weight: 600; font-size: 0.95rem; }

        /* Sağ Üst Köşedeki Lüks Kalp İkonu Stili */
        .favorite-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .favorite-icon:hover { transform: scale(1.15); }

        /* Modal Stili */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 450px; border-radius: 16px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: #888; }
        
        /* Form Elemanları */
        .detay-grup { margin-bottom: 15px; text-align: left; }
        .detay-grup label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #555; }
        .custom-select, .custom-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-family: 'Montserrat'; }
    </style>
</head>
<body>

    <nav class="navbar">Hisli Balon</nav>

    <main class="main-container">
        <div class="products-grid" id="store-front"></div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProduct()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const WHATSAPP = "905373568453";
        const sheetCSV = "https://docs.google.com/spreadsheets/d/1ii4RrMqvNBm9HMlfVJI4x2riVtWP14J-9MfCAn2b9-0/export?format=csv";
        let products = [];

        Papa.parse(sheetCSV, { download: true, header: true, complete: (res) => { products = res.data; renderHome(); } });

        function renderHome() {
            const container = document.getElementById('store-front');
            
            // Tarayıcı hafızasındaki favori listesini oku
            const currentFavorites = JSON.parse(localStorage.getItem('hisli_favorites')) || [];

            container.innerHTML = products.filter(p => p.UrunAdi).map((p, i) => {
                // Bu ürün favorilerde var mı kontrol et
                const isFav = currentFavorites.includes(p.UrunAdi.trim());
                const heartClass = isFav ? 'fa-solid' : 'fa-regular';
                const heartColor = isFav ? '#e74c3c' : '#cfa8a8'; // Favoriyse kırmızı/pembe, değilse lüks gül kurusu tonu

                return `
                    <div class="product-card" onclick="openProduct(${i})">
                        <i class="${heartClass} fa-heart favorite-icon" style="color: ${heartColor};" onclick="toggleFavorite(event, '${p.UrunAdi.replace(/'/g, "\\'")}')"></i>
                        <img src="${p.ResimURL || ''}">
                        <h3>${p.UrunAdi}</h3>
                        <p>${p.Fiyat} TL</p>
                    </div>
                `;
            }).join('');
        }

        // FAVORİ AÇMA / KAPATMA SİHRİ
        function toggleFavorite(event, urunAdi) {
            event.stopPropagation(); // Arkadaki kartın tıklanma (modal) olayını durdurur.
            
            const icon = event.target;
            let favorites = JSON.parse(localStorage.getItem('hisli_favorites')) || [];
            urunAdi = urunAdi.trim();

            if (favorites.includes(urunAdi)) {
                // Favorilerden çıkar
                favorites = favorites.filter(fav => fav !== urunAdi);
                icon.classList.remove('fa-solid');
                icon.classList.add('fa-regular');
                icon.style.color = '#cfa8a8';
            } else {
                // Favorilere ekle
                favorites.push(urunAdi);
                icon.classList.remove('fa-regular');
                icon.classList.add('fa-solid');
                icon.style.color = '#e74c3c';
            }

            // Listeyi tarayıcı hafızasına kaydet
            localStorage.setItem('hisli_favorites', JSON.stringify(favorites));
        }

        function openProduct(i) {
            const p = products[i];
            document.getElementById('modal-body').innerHTML = `
                <img src="${p.ResimURL}" style="width:100%; border-radius:8px; margin-bottom:15px;">
                <h2 style="font-family:'Playfair Display'; margin:0 0 10px 0;">${p.UrunAdi}</h2>
                <p style="color:var(--accent-color); font-weight:700; margin-bottom:15px;">${p.Fiyat} TL</p>
                <p style="font-size:0.9rem; margin-bottom:20px; line-height:1.5;">${p.Aciklama || ''}</p>
                
                ${p.VaryasyonBasligi1 ? `<div class="detay-grup"><label>${p.VaryasyonBasligi1}</label><select id="s1" class="custom-select">${p.Varyasyonlar1.split(',').map(o=>`<option>${o.trim()}</option>`).join('')}</select></div>` : ''}
                ${p.VaryasyonBasligi2 ? `<div class="detay-grup"><label>${p.VaryasyonBasligi2}</label><select id="s2" class="custom-select">${p.Varyasyonlar2.split(',').map(o=>`<option>${o.trim()}</option>`).join('')}</select></div>` : ''}
                ${p.OzelNot ? `<div class="detay-grup"><label>${p.OzelNot}</label><input type="text" id="note" class="custom-input" placeholder="Buraya yazabilirsiniz..."></div>` : ''}
                
                <div style="margin-top:25px;">
                    ${p.ShopierLink ? `<a href="${p.ShopierLink}" target="_blank" class="btn" style="display:block; background:#CFA8A8; color:white; padding:12px; text-align:center; text-decoration:none; margin-bottom:10px; border-radius:8px; font-weight:600;">Kredi Kartı ile Al</a>` : ''}
                    <button onclick="sendWA(${i})" style="width:100%; padding:12px; background:#A3D4B6; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-family:'Montserrat';">WhatsApp Sipariş</button>
                </div>
            `;
            document.getElementById('productModal').style.display = "block";
        }

        function closeProduct() { document.getElementById('productModal').style.display = "none"; }

        function sendWA(i) {
            const p = products[i];
            const s1 = document.getElementById('s1') ? document.getElementById('s1').value : '';
            const s2 = document.getElementById('s2') ? document.getElementById('s2').value : '';
            const note = document.getElementById('note') ? document.getElementById('note').value : '';
            const message = `Merhaba, ${p.UrunAdi} siparişi vermek istiyorum.%0A${p.VaryasyonBasligi1 || ''}: ${s1}%0A${p.VaryasyonBasligi2 || ''}: ${s2}%0ANot: ${note}`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${message}`);
        }
    </script>
</body>
</html>
