<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisli Balon | Ürünlerimiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    
    <h1 class="text-3xl font-bold text-center mb-10">Hisli Balon Ürünlerimiz</h1>

    <div id="urun-vitrini" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
        <p class="text-center w-full text-gray-500">Ürünler yükleniyor...</p>
    </div>

    <script>
        fetch('urunler.json')
            .then(response => response.json())
            .then(data => {
                const vitrin = document.getElementById('urun-vitrini');
                vitrin.innerHTML = ''; 
                
                if(!data.products || data.products.length === 0) {
                    vitrin.innerHTML = '<p class="text-center w-full text-gray-500">Henüz ürün eklenmemiş.</p>';
                    return;
                }

                data.products.forEach(urun => {
                    // Resim yolunu düzeltme
                    const imageUrl = urun.image1 ? urun.image1.replace('/images/', 'images/') : '';

                    // Ürün Kartı Tasarımı
                    const card = `
                        <div class="bg-white rounded-lg shadow-md overflow-hidden border border-gray-100">
                            <img src="${imageUrl}" alt="${urun.title}" class="w-full h-64 object-cover">
                            <div class="p-4">
                                <span class="text-xs text-pink-500 font-semibold uppercase">${urun.category}</span>
                                <h2 class="text-xl font-bold text-gray-800 mt-1">${urun.title}</h2>
                                <p class="text-gray-600 mt-2 text-sm">${urun.description}</p>
                                <div class="mt-4">
                                    ${urun.inStock 
                                        ? '<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">Stokta Var</span>' 
                                        : '<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded-full">Tükendi</span>'}
                                </div>
                            </div>
                        </div>
                    `;
                    vitrin.innerHTML += card;
                });
            })
            .catch(error => {
                console.error("Hata:", error);
                document.getElementById('urun-vitrini').innerHTML = '<p class="text-center w-full text-red-500">Ürünler bulunamadı. Lütfen panelden ürün ekleyin.</p>';
            });
    </script>
</body>
</html>
