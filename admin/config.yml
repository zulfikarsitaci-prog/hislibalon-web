backend:
  name: test-repo
  

media_folder: "images"
public_folder: "images"

collections:
  - name: "urunler"
    label: "Katalog & Ürünler"
    folder: "urunler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ürün Adı", name: "title", widget: "string"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Çiçekli Aranjmanlar", "Hediyelik & Peluş"]}
      - {label: "Açıklama", name: "description", widget: "text"}
      - {label: "Stokta Var Mı?", name: "inStock", widget: "boolean", default: true}
      - {label: "Ana Fotoğraf", name: "image1", widget: "image"}
